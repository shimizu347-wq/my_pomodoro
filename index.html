<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Pomodoro Pro</title>
    <style>
        :root {
            --bg-color: #F8F3F1;
            --card-bg: #FFFFFF;
            --main-color: #D4A5A5;     /* くすみピンク */
            --accent-color: #D98880;   /* テラコッタ */
            --text-color: #4D4D4D;
            --gold-color: #C2A88A;     /* マットゴールド */
            --shadow: 0 15px 35px rgba(212, 165, 165, 0.2);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 360px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--gold-color);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .timer-card {
            background: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        /* プリセットボタンのエリア */
        .presets {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .preset-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            background-color: transparent;
            color: var(--gold-color);
            border: 1px solid var(--gold-color);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preset-btn.active {
            background-color: var(--gold-color);
            color: white;
        }

        .status-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            margin-bottom: 0.2rem;
            height: 1.2rem;
        }

        .display {
            font-size: 5rem;
            font-weight: 200;
            margin: 0.5rem 0 1.5rem 0;
            font-variant-numeric: tabular-nums;
            color: var(--text-color);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        button.main-btn {
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start {
            background-color: var(--main-color);
            color: white;
            box-shadow: 0 5px 15px rgba(212, 165, 165, 0.4);
            min-width: 120px;
        }

        .reset {
            background-color: #F0F0F0;
            color: #999;
        }

        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #F0EAE8;
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--main-color), var(--accent-color));
            transition: width 1s linear;
        }

        @media (max-width: 375px) {
            .display { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Chic Pomodoro</h1>
    
    <div class="timer-card">
        <div class="presets">
            <button class="preset-btn" onclick="setTimer(15, 3, this)">15min</button>
            <button class="preset-btn active" onclick="setTimer(25, 5, this)">25min</button>
            <button class="preset-btn" onclick="setTimer(50, 10, this)">50min</button>
        </div>

        <div class="status-label" id="statusLabel">Work Focus</div>
        <div class="display" id="display">25:00</div>
        
        <div class="controls">
            <button class="main-btn start" id="startBtn" onclick="toggleTimer()">Start</button>
            <button class="main-btn reset" onclick="resetTimer()">Reset</button>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
/* --- 音声合成エンジン（クリスタル風） --- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCrystalSound() {
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; // C-E-G-C-E の和音
    const now = audioCtx.currentTime;

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine'; // 透明感のある正弦波
        osc.frequency.setValueAtTime(freq, now + i * 0.1); // 0.1秒ずつずらしてアルペジオに
        
        gain.gain.setValueAtTime(0.2, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.1 + 1.5); // 残響を残して消える
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 1.5);
    });
}

/* --- タイマーロジック（更新版） --- */
let workMinutes = 25;
let breakMinutes = 5;
let timeLeft = workMinutes * 60;
let totalTime = workMinutes * 60;
let timerId = null;
let isBreak = false;

const display = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const progressBar = document.getElementById('progressBar');
const statusLabel = document.getElementById('statusLabel');

function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    const progressPercent = (timeLeft / totalTime) * 100;
    progressBar.style.width = `${progressPercent}%`;
}

function toggleTimer() {
    if (audioCtx.state === 'suspended') audioCtx.resume(); // ブラウザの制限解除
    if (timerId) pauseTimer();
    else startTimer();
}

function startTimer() {
    startBtn.innerText = 'Pause';
    startBtn.style.backgroundColor = 'var(--accent-color)';
    timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) completeCycle();
    }, 1000);
}

function pauseTimer() {
    clearInterval(timerId);
    timerId = null;
    startBtn.innerText = 'Resume';
    startBtn.style.backgroundColor = 'var(--main-color)';
}

function completeCycle() {
    clearInterval(timerId);
    timerId = null;
    
    // 休憩に入る瞬間に音を鳴らす！
    playCrystalSound();

    if (!isBreak) {
        alert("Work finished! クリスタルな休憩を。");
        isBreak = true;
        timeLeft = breakMinutes * 60;
        totalTime = breakMinutes * 60;
        statusLabel.innerText = "Short Break";
        statusLabel.style.color = "#88A0A8";
    } else {
        alert("Break finished! 集中を再開しましょう。");
        isBreak = false;
        timeLeft = workMinutes * 60;
        totalTime = workMinutes * 60;
        statusLabel.innerText = "Work Focus";
        statusLabel.style.color = "var(--accent-color)";
    }
    
    startBtn.innerText = 'Start';
    startBtn.style.backgroundColor = 'var(--main-color)';
    updateDisplay();
}

function resetTimer() {
    clearInterval(timerId);
    timerId = null;
    isBreak = false;
    timeLeft = workMinutes * 60;
    totalTime = workMinutes * 60;
    statusLabel.innerText = "Work Focus";
    statusLabel.style.color = "var(--accent-color)";
    startBtn.innerText = 'Start';
    startBtn.style.backgroundColor = 'var(--main-color)';
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>

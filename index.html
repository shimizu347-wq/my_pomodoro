<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Pomodoro</title>
    <style>
        :root {
            /* 大人女子パレット */
            --bg-color: #F8F3F1;       /* ソフトベージュ */
            --card-bg: #FFFFFF;        /* 純白 */
            --main-color: #D4A5A5;     /* くすみピンク */
            --accent-color: #D98880;   /* テラコッタ */
            --text-color: #4D4D4D;     /* リッチチャコール（黒すぎない） */
            --gold-color: #C2A88A;     /* マットゴールド */
            --shadow: 0 15px 35px rgba(212, 165, 165, 0.2); /* 柔らかなピンクの影 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* スマホでのスクロール防止 */
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 340px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--gold-color);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .timer-card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 30px; /* 大きめの角丸で柔らかく */
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden; /* プログレスバー用 */
        }

        /* プログレスバー（時間の進行を視覚化） */
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #EEEEEE;
        }

        .progress-bar {
            height: 100%;
            width: 100%; /* 初期は全開 */
            background: linear-gradient(90deg, var(--main-color), var(--accent-color));
            transition: width 1s linear; /* スムーズなアニメーション */
        }

        .status-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .display {
            font-size: 5rem;
            font-weight: 200; /* 細めのフォントでスタイリッシュに */
            margin: 0.5rem 0 2rem 0;
            font-variant-numeric: tabular-nums; /* 数字の幅を一定に */
            color: var(--text-color);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 50px; /* 丸いボタン */
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        button:active {
            transform: scale(0.96); /* クリック時に少し沈む */
        }

        .start {
            background-color: var(--main-color);
            color: white;
            box-shadow: 0 5px 15px rgba(212, 165, 165, 0.4);
        }

        .start.pausing {
            background-color: var(--accent-color);
        }

        .reset {
            background-color: transparent;
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
        }

        /* スマホ向け調整 */
        @media (max-width: 375px) {
            .display { font-size: 4.5rem; }
            button { padding: 12px 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Chic Pomodoro</h1>
    <div class="timer-card">
        <div class="status-label">Work Focus</div>
        <div class="display" id="display">25:00</div>
        <div class="controls">
            <button class="start" id="startBtn" onclick="toggleTimer()">Start</button>
            <button class="reset" onclick="resetTimer()">Reset</button>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    const WORK_TIME = 25 * 60; // 25分を秒で
    let timeLeft = WORK_TIME;
    let timerId = null;
    let totalTime = WORK_TIME; // プログレスバー計算用

    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const progressBar = document.getElementById('progressBar');

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        // プログレスバーの更新
        const progressPercent = (timeLeft / totalTime) * 100;
        progressBar.style.width = `${progressPercent}%`;
    }

    function toggleTimer() {
        if (timerId) {
            // 一時停止
            clearInterval(timerId);
            timerId = null;
            startBtn.innerText = 'Resume';
            startBtn.classList.remove('pausing');
        } else {
            // スタート
            startBtn.innerText = 'Pause';
            startBtn.classList.add('pausing');
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    startBtn.innerText = 'Start';
                    startBtn.classList.remove('pausing');
                    timeLeft = WORK_TIME; // 自動リセット（必要に応じて変更可）
                    updateDisplay();
                    alert("お疲れ様です！素晴らしい集中力でした。少し休憩しましょう。");
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        timeLeft = WORK_TIME;
        totalTime = WORK_TIME; // 総時間をリセット
        startBtn.innerText = 'Start';
        startBtn.classList.remove('pausing');
        updateDisplay();
    }

    // 初期表示
    updateDisplay();
</script>

</body>
</html>

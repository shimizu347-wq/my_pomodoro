<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Pomodoro Crystal v3</title>
    <style>
        :root {
            --bg-color: #F8F3F1;
            --card-bg: #FFFFFF;
            --main-color: #D4A5A5;
            --accent-color: #D98880;
            --text-color: #4D4D4D;
            --gold-color: #C2A88A;
            --shadow: 0 15px 35px rgba(212, 165, 165, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 360px; }
        h1 { font-size: 1.1rem; font-weight: 300; letter-spacing: 0.2em; color: var(--gold-color); margin-bottom: 1.5rem; text-transform: uppercase; }
        .timer-card { background: var(--card-bg); padding: 2rem 1.5rem; border-radius: 30px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
        .presets { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        
        .preset-btn {
            padding: 6px 12px; font-size: 0.75rem; background-color: transparent;
            color: var(--gold-color); border: 1px solid var(--gold-color); border-radius: 15px; cursor: pointer;
        }
        .preset-btn.active { background-color: var(--gold-color); color: white; }

        .status-label { font-size: 0.85rem; font-weight: bold; color: var(--accent-color); letter-spacing: 0.1em; margin-bottom: 0.2rem; height: 1.2rem; }
        .display { font-size: 5rem; font-weight: 200; margin: 0.5rem 0 1.5rem 0; font-variant-numeric: tabular-nums; }
        .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 0.5rem; }
        
        button.main-btn { padding: 14px 28px; font-size: 0.9rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .start { background-color: var(--main-color); color: white; min-width: 120px; box-shadow: 0 5px 15px rgba(212, 165, 165, 0.4); }
        .reset { background-color: #F0F0F0; color: #999; }
        .sound-test { margin-top: 15px; font-size: 0.7rem; color: var(--gold-color); background: none; border: none; text-decoration: underline; cursor: pointer; }

        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background-color: #F0EAE8; }
        .progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--main-color), var(--accent-color)); transition: width 1s linear; }
    </style>
</head>
<body>

<div class="container">
    <h1>Chic Pomodoro</h1>
    <div class="timer-card">
        <div class="presets">
            <button class="preset-btn" onclick="setTimer(1, 1, this)">Test(1m)</button>
            <button class="preset-btn" onclick="setTimer(15, 3, this)">15min</button>
            <button class="preset-btn active" onclick="setTimer(25, 5, this)">25min</button>
            <button class="preset-btn" onclick="setTimer(50, 10, this)">50min</button>
        </div>

        <div class="status-label" id="statusLabel">Work Focus</div>
        <div class="display" id="display">25:00</div>
        
        <div class="controls">
            <button class="main-btn start" id="startBtn" onclick="handleStartClick()">Start</button>
            <button class="main-btn reset" onclick="resetTimer()">Reset</button>
        </div>

        <button class="sound-test" onclick="playCrystalSound()">♪ Sound Test</button>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    /* --- グローバル変数 --- */
    let audioCtx = null;
    let wakeLock = null;
    let workMinutes = 25, breakMinutes = 5;
    let timeLeft = workMinutes * 60, totalTime = workMinutes * 60;
    let timerId = null, isBreak = false;

    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const progressBar = document.getElementById('progressBar');
    const statusLabel = document.getElementById('statusLabel');

    /* --- スリープ防止 (Wake Lock) --- */
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.error(`${err.name}: ${err.message}`); }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release();
            wakeLock = null;
        }
    }

    /* --- 音声処理 --- */
    function playCrystalSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
        const now = audioCtx.currentTime;
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.1);
            gain.gain.setValueAtTime(0.5, now + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.1 + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.1);
            osc.stop(now + i * 0.1 + 1.5);
        });
    }

    /* --- タイマー制御 --- */
    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        progressBar.style.width = `${(timeLeft / totalTime) * 100}%`;
    }

    async function handleStartClick() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            startBtn.innerText = 'Resume';
            startBtn.style.backgroundColor = 'var(--main-color)';
            releaseWakeLock();
        } else {
            await requestWakeLock();
            startBtn.innerText = 'Pause';
            startBtn.style.backgroundColor = 'var(--accent-color)';
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) completeCycle();
            }, 1000);
        }
    }

    function completeCycle() {
        clearInterval(timerId);
        timerId = null;
        playCrystalSound();
        releaseWakeLock();

        setTimeout(() => {
            if (!isBreak) {
                alert("Work finished! クリスタルな休憩を。");
                isBreak = true;
                timeLeft = totalTime = breakMinutes * 60;
                statusLabel.innerText = "Short Break";
                statusLabel.style.color = "#88A0A8";
            } else {
                alert("Break finished! 作業を再開しましょう。");
                isBreak = false;
                timeLeft = totalTime = workMinutes * 60;
                statusLabel.innerText = "Work Focus";
                statusLabel.style.color = "var(--accent-color)";
            }
            startBtn.innerText = 'Start';
            startBtn.style.backgroundColor = 'var(--main-color)';
            updateDisplay();
        }, 500);
    }

    function setTimer(w, b, btn) {
        if (timerId) { resetTimer(); }
        workMinutes = w; breakMinutes = b;
        isBreak = false;
        timeLeft = totalTime = workMinutes * 60;
        statusLabel.innerText = "Work Focus";
        statusLabel.style.color = "var(--accent-color)";
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateDisplay();
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        isBreak = false;
        timeLeft = totalTime = workMinutes * 60;
        statusLabel.innerText = "Work Focus";
        statusLabel.style.color = "var(--accent-color)";
        startBtn.innerText = 'Start';
        startBtn.style.backgroundColor = 'var(--main-color)';
        releaseWakeLock();
        updateDisplay();
    }

    // 画面が再度表示されたときにスリープ防止を再有効化
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    updateDisplay();
</script>

</body>
</html>
